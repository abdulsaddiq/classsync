<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassSync — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="login-bg-art">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-lines"></div>
</div>

<div class="login-layout">

  <!-- Left panel - branding -->
  <div class="login-brand">
    <div class="brand-content">
      <div class="brand-mark">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="14" fill="url(#grad1)"/>
          <path d="M14 16h20M14 24h14M14 32h18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="36" cy="32" r="6" fill="white" fill-opacity="0.9"/>
          <path d="M33.5 32l1.5 1.5 3-3" stroke="#1a1f2e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="grad1" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#06b6d4"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="brand-name">ClassSync</h1>
      <p class="brand-tagline">Your classroom, synchronized.</p>

      <div class="brand-features">
        <div class="feature-item">
          <span class="feature-dot dot-violet"></span>
          <span>Track assignments & deadlines</span>
        </div>
        <div class="feature-item">
          <span class="feature-dot dot-cyan"></span>
          <span>Share classwork & records</span>
        </div>
        <div class="feature-item">
          <span class="feature-dot dot-emerald"></span>
          <span>Never miss what's important</span>
        </div>
      </div>

      <div class="brand-footer">
        <span class="version-tag">v2.0</span>
      </div>
    </div>
  </div>

  <!-- Right panel - form -->
  <div class="login-form-panel">
    <div class="login-card" id="loginCard">
      <div class="card-header">
        <h2>Welcome back</h2>
        <p>Sign in to continue to ClassSync</p>
      </div>

      <div class="field-group">
        <label class="field-label" for="l-name">Full Name</label>
        <div class="field-input-wrap">
          <svg class="field-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>
          <input id="l-name" type="text" placeholder="e.g. Saddiq Ahmed" autocomplete="name" class="field-input">
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="l-roll">Roll Number</label>
        <div class="field-input-wrap">
          <svg class="field-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M4 4a2 2 0 012-2h8a2 2 0 012 2v12l-4-2-4 2V4z"/></svg>
          <input id="l-roll" type="text" placeholder="e.g. 23B81A6601" class="field-input mono" oninput="this.value=this.value.toUpperCase()">
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="l-pass">Password</label>
        <div class="field-input-wrap">
          <svg class="field-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"/></svg>
          <input id="l-pass" type="password" placeholder="Enter your password" class="field-input" autocomplete="current-password">
          <button class="eye-toggle" onclick="togglePwd()" type="button" tabindex="-1" title="Toggle visibility">
            <svg id="eyeOpen" viewBox="0 0 20 20" fill="currentColor"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            <svg id="eyeClosed" viewBox="0 0 20 20" fill="currentColor" style="display:none"><path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd"/><path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.064 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/></svg>
          </button>
        </div>
      </div>

      <div class="remember-row">
        <label class="checkbox-wrap">
          <input type="checkbox" id="remember">
          <span class="checkmark"></span>
          <span>Remember me for 30 days</span>
        </label>
      </div>

      <button class="signin-btn" id="signinBtn" onclick="doLogin()">
        <span class="btn-text">Sign In</span>
        <span class="btn-arrow">→</span>
        <span class="btn-spinner" style="display:none">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.3"/><path d="M12 2a10 10 0 0110 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
        </span>
      </button>

      <div class="login-error" id="loginErr">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        <span id="loginErrText"></span>
      </div>

      <p class="login-hint">New to ClassSync? Just enter your details and an account will be created automatically.</p>
    </div>
  </div>

</div>

<div class="toast-wrap" id="toastWrap"></div>
<script src="script.js"></script>
</body>
</html>
